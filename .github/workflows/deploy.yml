name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Backup ZIP
        run: zip -r backup.zip . -x "node_modules/*" ".git/*" "backups/*"

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-backup
          path: backup.zip

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Lighthouse Audit
        run: |
          npm install -g lighthouse
          lighthouse https://ewaste-kochi-main.vercel.app --quiet --chrome-flags="--headless"

      - name: Ping Sitemap
        run: curl "https://www.google.com/ping?sitemap=https://ewaste-kochi-main.vercel.app/sitemap-index.xml"
