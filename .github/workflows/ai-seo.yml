name: AI SEO Autopilot

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no actual changes)'
        required: false
        default: 'false'
        type: boolean
      analysis_days:
        description: 'Number of days to analyze (default: 28)'
        required: false
        default: '28'
        type: string

env:
  SITE_URL: 'https://ewastekochi.com'
  PYTHONPATH: '${{ github.workspace }}'

jobs:
  seo-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r automation/requirements.txt
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests

      - name: Validate Configuration
        run: |
          echo "?? Validating SEO Autopilot configuration..."
          python -c "
import os
print(f'Site URL: {os.getenv(\"SITE_URL\")}')
print(f'Python path: {os.getenv(\"PYTHONPATH\")}')
print('Configuration validated successfully')
"

      - name: Run SEO Autopilot Analysis
        env:
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SITE_URL: ${{ env.SITE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          ANALYSIS_DAYS: ${{ github.event.inputs.analysis_days || '28' }}
        run: |
          echo "?? Starting AI SEO Autopilot Analysis..."
          echo "?? Dry Run: $DRY_RUN"
          echo "?? Analysis Period: $ANALYSIS_DAYS days"
          echo "?? Site URL: $SITE_URL"
          
          if [ "$DRY_RUN" = "true" ]; then
            python automation/seo_autopilot.py --dry-run
          else
            python automation/seo_autopilot.py
          fi

      - name: Upload SEO Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-reports-${{ github.run_number }}
          path: |
            data/seo_autopilot_report.json
            data/seo_autopilot_report.md
            data/seo_autopilot_success.json
          retention-days: 30

      - name: Create Optimization Pull Requests
        if: github.event.inputs.dry_run != 'true' && success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "?? AI SEO Autopilot: Optimization Recommendations"
          title: "?? Weekly SEO Optimization Opportunities"
          body: |
            ## ?? AI SEO Autopilot Recommendations
            
            This PR contains automated SEO optimization recommendations generated by the AI SEO Autopilot system.
            
            ### ?? Analysis Summary
            - **Analysis Period**: Last 28 days
            - **Generated**: ${{ github.event.head_commit.timestamp }}
            - **Site**: ${{ env.SITE_URL }}
            
            ### ?? Changes Included
            - **Low CTR Optimizations**: Pages with CTR < 2% and >100 impressions
            - **Striking Distance Boosts**: Pages ranking positions 4-12
            - **AI-Powered Recommendations**: Title and meta description suggestions
            - **Internal Linking Strategy**: Contextual linking recommendations
            
            ### ?? Implementation Steps
            1. Review the optimization files in `optimizations/` directory
            2. Apply recommended title/meta changes for low CTR pages
            3. Implement internal linking strategies for striking distance pages
            4. Monitor performance after implementation
            
            ### ?? Expected Impact
            - Improved click-through rates
            - Higher search rankings
            - Increased organic traffic
            - Better user engagement
            
            ---
            *This PR was auto-generated by AI SEO Autopilot. Please review changes before merging.*
          branch: seo/optimization-recommendations
          delete-branch: true
          labels: |
            seo
            automation
            ai-generated

      - name: Run Lighthouse SEO Audit
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "?? Running Lighthouse SEO audit..."
          npm install -g @lhci/cli@0.12.x
          
          # Create LHCI config
          cat > lighthouserc.js << EOF
          module.exports = {
            ci: {
              collect: {
                url: ['${{ env.SITE_URL }}/'],
                startServerCommand: 'npm run preview',
                startServerReadyPattern: 'Local:',
                startServerReadyTimeout: 30000,
              },
              assert: {
                assertions: {
                  'categories:performance': ['warn', { minScore: 0.8 }],
                  'categories:accessibility': ['error', { minScore: 0.9 }],
                  'categories:best-practices': ['warn', { minScore: 0.8 }],
                  'categories:seo': ['warn', { minScore: 0.8 }],
                  'categories:pwa': 'off',
                },
              },
              upload: {
                target: 'temporary-public-storage',
              },
            },
          };
          EOF
          
          # Run Lighthouse CI (if preview server available)
          if command -v npm &> /dev/null && [ -f "package.json" ]; then
            echo "?? Running Lighthouse CI audit..."
            lhci autorun || echo "?? Lighthouse CI completed with warnings"
          else
            echo "?? Skipping Lighthouse CI - no preview server available"
          fi

      - name: Ping Google Sitemap
        if: github.event.inputs.dry_run != 'true'
        run: |
          echo "?? Pinging Google about sitemap updates..."
          
          # Ping main sitemap
          curl -s "https://www.google.com/ping?sitemap=${{ env.SITE_URL }}/sitemap-index.xml" || echo "?? Failed to ping main sitemap"
          
          # Ping individual sitemaps
          curl -s "https://www.google.com/ping?sitemap=${{ env.SITE_URL }}/sitemap.xml" || echo "?? Failed to ping sitemap.xml"
          curl -s "https://www.google.com/ping?sitemap=${{ env.SITE_URL }}/sitemap-blogs.xml" || echo "?? Failed to ping sitemap-blogs.xml"
          curl -s "https://www.google.com/ping?sitemap=${{ env.SITE_URL }}/sitemap-services.xml" || echo "?? Failed to ping sitemap-services.xml"
          
          echo "?? Sitemap ping completed"

      - name: Notify Slack (Optional)
        if: github.event.inputs.dry_run != 'true' && success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "?? Sending Slack notification..."
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"?? AI SEO Autopilot completed successfully! Check the optimization PR for recommendations."}' \
              "$SLACK_WEBHOOK_URL" || echo "?? Failed to send Slack notification"
          else
            echo "?? No Slack webhook configured"
          fi

      - name: Summary Report
        if: always()
        run: |
          echo "## ?? AI SEO Autopilot Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Analysis Period**: ${{ github.event.inputs.analysis_days || '28' }} days" >> $GITHUB_STEP_SUMMARY
          echo "- **Site URL**: ${{ env.SITE_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "data/seo_autopilot_report.json" ]; then
            echo "**Results:**" >> $GITHUB_STEP_SUMMARY
            python -c "
import json
with open('data/seo_autopilot_report.json', 'r') as f:
    data = json.load(f)
print(f'- **Total Opportunities**: {data.get(\"total_opportunities\", 0)}')
print(f'- **High Priority**: {data.get(\"high_priority_opportunities\", 0)}')
print(f'- **Potential Impact**: +{data.get(\"potential_total_impact\", 0)} clicks')
" >> $GITHUB_STEP_SUMMARY
          elif [ -f "data/seo_autopilot_success.json" ]; then
            echo "**Status**: ?? No SEO opportunities detected - Site is performing well!" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status**: ?? Report generation failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Review the generated reports in the artifacts" >> $GITHUB_STEP_SUMMARY
          echo "2. Check the optimization pull request" >> $GITHUB_STEP_SUMMARY
          echo "3. Implement recommended changes" >> $GITHUB_STEP_SUMMARY
          echo "4. Monitor performance improvements" >> $GITHUB_STEP_SUMMARY
